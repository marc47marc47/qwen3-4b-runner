name: Build Binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: candle01
  APP_NAME: qwen3-4b-runner

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runs_on: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_ext: .exe
          - name: linux-x64
            runs_on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_ext: ""
          - name: macos-arm64
            runs_on: macos-14
            target: aarch64-apple-darwin
            artifact_ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BIN_NAME}${{ matrix.artifact_ext }}" \
             "dist/${APP_NAME}-${{ matrix.name }}${{ matrix.artifact_ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.name }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.name }}${{ matrix.artifact_ext }}
          if-no-files-found: error
